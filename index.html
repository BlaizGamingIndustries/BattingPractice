<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Infinite Batting Practice 3D</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d131a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 1024px;
      max-height: 768px;
      background: linear-gradient(to bottom, #111d4a, #2a5298);
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #ui-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      top: 20px;
      background: rgba(11, 19, 30, 0.85);
      padding: 12px 25px;
      border-radius: 30px;
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
      border: 2px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      pointer-events: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    #stats-panel {
      left: 20px;
      display: flex;
      gap: 20px;
    }

    .stat-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label {
      color: #8a9fc4;
      font-size: 0.85rem;
      text-transform: uppercase;
    }

    .val {
      color: #fff;
    }

    #streak-val {
      color: #ff9f43;
      font-weight: 900;
    }

    #pitch-feedback {
      right: 20px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
      min-width: 180px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .fb-good {
      color: #2ed573 !important;
      text-shadow: 0 0 10px rgba(46,213,115,0.4);
    }

    .fb-great {
      color: #ff9f43 !important;
      text-shadow: 0 0 15px rgba(255,159,67,0.6);
    }

    .fb-miss {
      color: #ff4757 !important;
    }

    #touch-zone {
      position: absolute;
      bottom: 40px;
      right: 40px;
      pointer-events: auto;
      z-index: 10;
    }

    #swing-btn {
      width: 130px;
      height: 130px;
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      border-radius: 50%;
      border: 5px solid #ffffff;
      color: white;
      font-size: 1.6rem;
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(255, 71, 87, 0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.05s;
      cursor: pointer;
    }

    #swing-btn:active {
      transform: scale(0.90) translateY(4px);
    }

    #start-overlay {
      position: absolute;
      inset: 0;
      background: rgba(4, 8, 18, 0.82);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
      text-align: center;
      padding: 30px;
      pointer-events: auto;
    }

    #start-overlay h1 {
      font-size: clamp(2.1rem, 6vw, 4rem);
      margin-bottom: 12px;
      text-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }

    #start-overlay p {
      max-width: 520px;
      color: #cbd5e1;
      line-height: 1.5;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    #start-btn {
      border: none;
      border-radius: 999px;
      padding: 16px 32px;
      font-weight: 900;
      font-size: 1.1rem;
      color: white;
      background: linear-gradient(135deg, #2ed573, #1eae59);
      box-shadow: 0 14px 30px rgba(46, 213, 115, 0.25);
      cursor: pointer;
    }

    #brand {
      position: absolute;
      left: 20px;
      bottom: 18px;
      color: rgba(255,255,255,0.65);
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
    }

    @media (max-width: 650px) {
      .hud {
        top: 14px;
        padding: 10px 14px;
        font-size: 0.9rem;
      }

      #stats-panel {
        left: 10px;
        gap: 10px;
      }

      #pitch-feedback {
        right: 10px;
        min-width: 120px;
      }

      #touch-zone {
        right: 20px;
        bottom: 24px;
      }

      #swing-btn {
        width: 105px;
        height: 105px;
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
      <div id="stats-panel" class="hud">
        <div class="stat-group"><span class="label">Hits:</span><span id="hits-val" class="val">0</span></div>
        <div class="stat-group"><span class="label">Streak:</span><span id="streak-val" class="val">0</span></div>
      </div>

      <div id="pitch-feedback" class="hud">Ready</div>

      <div id="touch-zone">
        <div id="swing-btn">SWING</div>
      </div>

      <div id="brand">BlaizGamingIndustries</div>
    </div>

    <div id="start-overlay">
      <h1>Infinite Batting Practice 3D</h1>
      <p>Watch the pitch come toward the plate. Swing when the ball reaches the hitting zone. Better timing earns better hits and builds your streak.</p>
      <button id="start-btn">START GAME</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const container = document.getElementById("game-container");

    const hitsVal = document.getElementById("hits-val");
    const streakVal = document.getElementById("streak-val");
    const pitchFeedback = document.getElementById("pitch-feedback");
    const swingBtn = document.getElementById("swing-btn");
    const startOverlay = document.getElementById("start-overlay");
    const startBtn = document.getElementById("start-btn");

    let cw = 1024;
    let ch = 768;
    let dpr = 1;

    let gameRunning = false;
    let totalHits = 0;
    let streak = 0;
    let swingFlash = 0;
    let lastTime = 0;

    const plate = {
      x: 0,
      y: 0,
      w: 115,
      h: 34
    };

    let ball = null;

    function resizeCanvas() {
      dpr = Math.max(1, window.devicePixelRatio || 1);
      const rect = container.getBoundingClientRect();

      cw = Math.max(320, rect.width);
      ch = Math.max(480, rect.height);

      canvas.width = Math.floor(cw * dpr);
      canvas.height = Math.floor(ch * dpr);

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      plate.x = cw / 2;
      plate.y = ch * 0.76;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function createPitch() {
      const sideDrift = random(-85, 85);
      const speed = random(0.0065, 0.0105);

      ball = {
        progress: 0,
        speed,
        startX: cw / 2 + random(-35, 35),
        endX: cw / 2 + sideDrift,
        startY: ch * 0.28,
        endY: plate.y - 22,
        hit: false,
        missed: false
      };

      setFeedback("Pitch incoming", "");
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function easeInQuad(t) {
      return t * t;
    }

    function getBallScreenPosition() {
      if (!ball) {
        return { x: cw / 2, y: ch * 0.28, radius: 6, t: 0 };
      }

      const t = clamp(ball.progress, 0, 1);
      const eased = easeInQuad(t);

      const x = lerp(ball.startX, ball.endX, eased);
      const y = lerp(ball.startY, ball.endY, eased);

      // This is the important safety fix:
      // radius is always positive and finite, so Canvas arc() will not crash.
      const radius = clamp(6 + eased * 30, 6, 38);

      return { x, y, radius, t };
    }

    function setFeedback(text, className) {
      pitchFeedback.textContent = text;
      pitchFeedback.className = "hud";
      if (className) pitchFeedback.classList.add(className);
    }

    function updateHud() {
      hitsVal.textContent = totalHits;
      streakVal.textContent = streak;
    }

    function startGame() {
      totalHits = 0;
      streak = 0;
      swingFlash = 0;
      updateHud();
      startOverlay.style.display = "none";
      gameRunning = true;
      createPitch();
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    function swing() {
      if (!gameRunning || !ball || ball.hit || ball.missed) return;

      swingFlash = 6;

      const pos = getBallScreenPosition();
      const timingDistance = Math.abs(pos.y - (plate.y - 22));
      const horizontalDistance = Math.abs(pos.x - plate.x);

      if (timingDistance < 24 && horizontalDistance < 95) {
        totalHits++;
        streak++;

        if (timingDistance < 10 && horizontalDistance < 45) {
          setFeedback("Perfect hit!", "fb-great");
        } else {
          setFeedback("Good hit!", "fb-good");
        }

        ball.hit = true;
        updateHud();

        setTimeout(createPitch, 650);
      } else {
        streak = 0;
        setFeedback("Miss!", "fb-miss");
        ball.missed = true;
        updateHud();

        setTimeout(createPitch, 650);
      }
    }

    swingBtn.addEventListener("click", swing);
    swingBtn.addEventListener("touchstart", function(e) {
      e.preventDefault();
      swing();
    }, { passive: false });

    window.addEventListener("keydown", function(e) {
      if (e.code === "Space") {
        e.preventDefault();
        swing();
      }
    });

    startBtn.addEventListener("click", startGame);

    function update(dt) {
      if (!ball || ball.hit || ball.missed) return;

      ball.progress += ball.speed * dt;

      if (ball.progress >= 1.08) {
        streak = 0;
        ball.missed = true;
        setFeedback("Strike!", "fb-miss");
        updateHud();
        setTimeout(createPitch, 650);
      }

      if (swingFlash > 0) swingFlash--;
    }

    function drawField() {
      // Sky
      const sky = ctx.createLinearGradient(0, 0, 0, ch);
      sky.addColorStop(0, "#13225c");
      sky.addColorStop(0.55, "#2a5298");
      sky.addColorStop(1, "#18351f");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, cw, ch);

      // Stadium lights
      ctx.fillStyle = "rgba(255, 255, 220, 0.16)";
      ctx.beginPath();
      ctx.arc(cw * 0.16, ch * 0.14, 80, 0, Math.PI * 2);
      ctx.arc(cw * 0.84, ch * 0.14, 80, 0, Math.PI * 2);
      ctx.fill();

      // Outfield
      ctx.fillStyle = "#1f7a3f";
      ctx.beginPath();
      ctx.ellipse(cw / 2, ch * 0.78, cw * 0.56, ch * 0.32, 0, Math.PI, Math.PI * 2);
      ctx.fill();

      // Infield dirt
      ctx.fillStyle = "#b8793b";
      ctx.beginPath();
      ctx.moveTo(cw / 2, ch * 0.38);
      ctx.lineTo(cw * 0.25, ch * 0.78);
      ctx.lineTo(cw / 2, ch * 0.96);
      ctx.lineTo(cw * 0.75, ch * 0.78);
      ctx.closePath();
      ctx.fill();

      // Baselines
      ctx.strokeStyle = "rgba(255,255,255,0.9)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cw / 2, plate.y);
      ctx.lineTo(cw * 0.25, ch * 0.78);
      ctx.moveTo(cw / 2, plate.y);
      ctx.lineTo(cw * 0.75, ch * 0.78);
      ctx.stroke();

      // Pitcher's mound
      ctx.fillStyle = "#d39b58";
      ctx.beginPath();
      ctx.ellipse(cw / 2, ch * 0.44, 58, 18, 0, 0, Math.PI * 2);
      ctx.fill();

      // Home plate
      ctx.fillStyle = "#f8fafc";
      ctx.strokeStyle = "#1e293b";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(plate.x - plate.w / 2, plate.y - plate.h / 2);
      ctx.lineTo(plate.x + plate.w / 2, plate.y - plate.h / 2);
      ctx.lineTo(plate.x + plate.w / 2 - 20, plate.y + plate.h / 2);
      ctx.lineTo(plate.x, plate.y + plate.h / 2 + 18);
      ctx.lineTo(plate.x - plate.w / 2 + 20, plate.y + plate.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Hitting zone guide
      ctx.strokeStyle = "rgba(255,255,255,0.22)";
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.strokeRect(plate.x - 95, plate.y - 68, 190, 95);
      ctx.setLineDash([]);
    }

    function drawBatter() {
      const x = cw / 2 - 155;
      const y = plate.y + 42;

      // Body
      ctx.strokeStyle = "#111827";
      ctx.lineWidth = 10;
      ctx.lineCap = "round";

      ctx.beginPath();
      ctx.moveTo(x, y - 70);
      ctx.lineTo(x, y);
      ctx.lineTo(x - 28, y + 50);
      ctx.moveTo(x, y);
      ctx.lineTo(x + 24, y + 50);
      ctx.stroke();

      // Head
      ctx.fillStyle = "#f3c58f";
      ctx.beginPath();
      ctx.arc(x, y - 95, 20, 0, Math.PI * 2);
      ctx.fill();

      // Helmet
      ctx.fillStyle = "#1f2937";
      ctx.beginPath();
      ctx.arc(x, y - 100, 22, Math.PI, Math.PI * 2);
      ctx.fill();

      // Arms
      ctx.strokeStyle = "#ef4444";
      ctx.lineWidth = 9;
      ctx.beginPath();
      ctx.moveTo(x, y - 55);
      ctx.lineTo(x + 45, y - 78);
      ctx.stroke();

      // Bat
      ctx.strokeStyle = swingFlash > 0 ? "#facc15" : "#8b5a2b";
      ctx.lineWidth = 8;
      ctx.beginPath();
      if (swingFlash > 0) {
        ctx.moveTo(x + 35, y - 78);
        ctx.lineTo(x + 130, y - 42);
      } else {
        ctx.moveTo(x + 35, y - 78);
        ctx.lineTo(x + 95, y - 125);
      }
      ctx.stroke();
    }

    function drawBall() {
      if (!ball || ball.hit) return;

      const pos = getBallScreenPosition();

      // Extra safety: do not draw if any value is invalid.
      if (!Number.isFinite(pos.x) || !Number.isFinite(pos.y) || !Number.isFinite(pos.radius)) return;

      const safeRadius = clamp(Math.abs(pos.radius), 2, 50);

      // Shadow
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath();
      ctx.ellipse(pos.x + 5, pos.y + safeRadius + 10, safeRadius * 0.95, safeRadius * 0.28, 0, 0, Math.PI * 2);
      ctx.fill();

      // Baseball
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, safeRadius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#e11d48";
      ctx.lineWidth = Math.max(1, safeRadius * 0.11);

      // Stitches
      ctx.beginPath();
      ctx.arc(pos.x - safeRadius * 0.25, pos.y, safeRadius * 0.58, -1.25, 1.25);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(pos.x + safeRadius * 0.25, pos.y, safeRadius * 0.58, Math.PI - 1.25, Math.PI + 1.25);
      ctx.stroke();

      // Ball outline
      ctx.strokeStyle = "rgba(15,23,42,0.35)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, safeRadius, 0, Math.PI * 2);
      ctx.stroke();
    }

    function draw() {
      ctx.clearRect(0, 0, cw, ch);
      drawField();
      drawBatter();
      drawBall();
    }

    function gameLoop(now) {
      if (!gameRunning) return;

      const dt = Math.min(40, now - lastTime);
      lastTime = now;

      update(dt);
      draw();

      requestAnimationFrame(gameLoop);
    }

    // Draw the starting field behind the menu.
    drawField();
    drawBatter();
  </script>
</body>
</html>
